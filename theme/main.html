{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <style>
    /* Floating Action Button Styling */
    #steam-fab {
        position: fixed;
        bottom: 30px;
        right: 30px;
        background-color: #0078d4;
        color: white;
        border: none;
        border-radius: 50px;
        padding: 12px 20px;
        font-size: 14px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        cursor: pointer;
        z-index: 999;
        transition: transform 0.2s, background-color 0.2s;
    }
    #steam-fab:hover {
        background-color: #005a9e;
        transform: scale(1.05);
    }

    /* Modal Popup Overlay background */
    #steam-popup-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        background-color: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
    }

    /* Popup Inner Window Box */
    #steam-popup-content {
        background-color: var(--md-card-background, #2f363d);
        color: var(--md-typeset-color, #fff);
        padding: 24px;
        border-radius: 8px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        animation: fadeIn 0.2s ease-out;
    }

    .popup-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .popup-header h3 {
        margin: 0 !important;
        color: var(--md-typeset-color, #fff) !important;
    }
    .close-btn {
        background: none;
        border: none;
        font-size: 28px;
        cursor: pointer;
        color: #888;
        line-height: 20px;
    }
    .close-btn:hover {
        color: #fff;
    }

    .popup-table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
    }
    .popup-table th, .popup-table td {
        padding: 10px;
        text-align: left;
        border-bottom: 1px solid #444d56;
    }

    /* Google Translate Integration Styling inside the Modal */
    #translate-section {
        margin-bottom: 15px;
        padding-bottom: 15px;
        border-bottom: 1px dashed #444d56;
    }
    .goog-te-gadget-simple {
        border: 1px solid #444d56 !important;
        border-radius: 4px !important;
        padding: 6px !important;
        background-color: #24292e !important;
        color: #fff !important;
        font-family: inherit !important;
    }
    .goog-te-gadget-simple span {
        color: #fff !important;
    }
    /* Hide the default messy Google frame banner if it overrides */
    .skiptranslate iframe { visibility: hidden !important; display: none !important; }
    body { top: 0px !important; }

    @keyframes fadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
    }
  </style>
{% endblock %}

{% block footer %}
  {{ super() }}

  <!-- Floating Action Button -->
  <button id="steam-fab" onclick="toggleSteamPopup(true)" title="View Steam Versions & Settings">
    🎮 Steam Version & Options
  </button>

  <!-- Mini Popup Modal Overlay -->
  <div id="steam-popup-overlay" onclick="toggleSteamPopup(false)">
    <div id="steam-popup-content" onclick="event.stopPropagation()">
      <div class="popup-header">
        <h3>Live Steam Client Versions</h3>
        <button class="close-btn" onclick="toggleSteamPopup(false)">&times;</button>
      </div>
      <hr style="margin: 10px 0; border: 0; border-top: 1px solid #444d56;">
      
      <!-- Google Translate integration point -->
      <div id="translate-section">
        <div id="google_translate_element"></div>
      </div>

      <div id="steam-table-container">Loading latest version status...</div>
    </div>
  </div>

  <script>
  // ── 1. Google Translate Setup & Persistence Logic ───────────────────────
  window.googleTranslateElementInit = function () {
    new google.translate.TranslateElement({
      pageLanguage: "en",
      includedLanguages: "ms,zh-CN,th,id,ar,fr,de,ja,ko,pt,es,tr,vi",
      layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
      autoDisplay: false,
    }, "google_translate_element");
  };

  if (!document.getElementById("gt-script")) {
    var s = document.createElement("script");
    s.id = "gt-script";
    s.src = "//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit";
    document.head.appendChild(s);
  }

  function getSavedLang() { return localStorage.getItem("suo_lang") || ""; }
  function saveLang(lang) { localStorage.setItem("suo_lang", lang); }

  function applyLang(lang) {
    if (!lang) return;
    var tries = 0;
    var iv = setInterval(function () {
      var sel = document.querySelector(".goog-te-combo");
      if (sel) {
        sel.value = lang;
        sel.dispatchEvent(new Event("change"));
        clearInterval(iv);
      }
      if (++tries > 40) clearInterval(iv);
    }, 250);
  }

  // Monitor document changes to catch dynamic Google components and bind save triggers
  var observer = new MutationObserver(function () {
    var sel = document.querySelector(".goog-te-combo");
    if (sel && !sel._suoBound) {
      sel._suoBound = true;
      sel.addEventListener("change", function () {
        saveLang(sel.value);
      });
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });

  // ── 2. Modal Controls & Steam Version Fetching ──────────────────────────
  function toggleSteamPopup(show) {
      const overlay = document.getElementById('steam-popup-overlay');
      overlay.style.display = show ? 'flex' : 'none';
      if (show) {
          fetchLiveSteamVersions();
      }
  }

  async function fetchLiveSteamVersions() {
      const container = document.getElementById('steam-table-container');
      try {
          const response = await fetch('https://raw.githubusercontent.com/OpenSteam001/steam-monitor/master/README.md');
          if (!response.ok) throw new Error('Network response failed');
          
          const text = await response.text();
          const lines = text.split('\n');
          let tableLines = [];
          let foundTable = false;
          
          for (let line of lines) {
              if (line.includes('Channel | Version | Updated')) {
                  foundTable = true;
              }
              if (foundTable) {
                  if (line.trim() === '' && tableLines.length > 2) break;
                  tableLines.push(line);
              }
          }

          if (tableLines.length > 0) {
              let html = '<table class="popup-table"><thead>';
              tableLines.forEach((line, index) => {
                  const cells = line.split('|').map(c => c.trim()).filter(c => c !== '');
                  if (cells.length > 0 && !line.includes('---')) {
                      if (index === 0) {
                          html += '<tr>' + cells.map(c => `<th>${c}</th>`).join('') + '</tr></thead><tbody>';
                      } else {
                          html += '<tr>' + cells.map(c => `<td>${c}</td>`).join('') + '</tr>';
                      }
                  }
              });
              html += '</tbody></table>';
              container.innerHTML = html;
          } else {
              container.innerHTML = 'Error parsing version table structural data.';
          }
      } catch (error) {
          container.innerHTML = '<span style="color: #ff4d4d;">Failed to load live tracking data.</span>';
          console.error(error);
      }
  }

  // ── 3. MkDocs Material Architecture Safe Execution ──────────────────────
  function init() {
      applyLang(getSavedLang());
  }

  function hookNavigation() {
      if (typeof document$ !== "undefined") {
          document$.subscribe(function () {
              init();
          });
      } else {
          var tries = 0;
          var iv = setInterval(function () {
              if (typeof document$ !== "undefined") {
                  clearInterval(iv);
                  hookNavigation();
              }
              if (++tries > 20) {
                  clearInterval(iv);
                  init();
              }
          }, 300);
      }
  }

  document.addEventListener("DOMContentLoaded", hookNavigation);
  </script>
{% endblock %}
